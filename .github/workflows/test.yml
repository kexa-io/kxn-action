name: Test kxn-action

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-http-scan:
    name: HTTP security scan on kexa.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gather HTTP data from kexa.io
        run: |
          CODE=$(curl -s -o /dev/null -w '%{http_code}' https://kexa.io)
          DELAYS=$(curl -s -o /dev/null -w '%{time_total}' https://kexa.io | awk '{printf "%d", $1 * 1000}')
          HEADERS_RAW=$(curl -sI https://kexa.io)
          HSTS=$(echo "$HEADERS_RAW" | grep -i '^strict-transport-security:' | cut -d: -f2- | xargs || echo "")
          XCTO=$(echo "$HEADERS_RAW" | grep -i '^x-content-type-options:' | cut -d: -f2- | xargs || echo "")

          cat > /tmp/kexa-io.json <<EOJSON
          {"request":{"url":"https://kexa.io","code":$CODE,"delays":$DELAYS,"certificate":"present","headers":{"strict-transport-security":"$HSTS","x-content-type-options":"$XCTO"}}}
          EOJSON

          echo "--- Gathered ---"
          cat /tmp/kexa-io.json | jq .

      - uses: ./
        id: scan
        with:
          rules: test/rules
          resource-file: /tmp/kexa-io.json
          output: sarif
          sarif-file: kxn-results.sarif
          upload-sarif: 'false'
          fail-on-violations: 'false'

      - name: Show results
        if: always()
        run: |
          echo "Total: ${{ steps.scan.outputs.total }}"
          echo "Passed: ${{ steps.scan.outputs.passed }}"
          echo "Failed: ${{ steps.scan.outputs.failed }}"
          if [ -f kxn-results.sarif ]; then
            echo "--- SARIF output ---"
            cat kxn-results.sarif | head -100
          fi

      - name: Verify scan ran
        if: always()
        run: |
          TOTAL="${{ steps.scan.outputs.total }}"
          if [ -z "$TOTAL" ] || [ "$TOTAL" = "0" ]; then
            echo "::error::Scan did not evaluate any rules"
            exit 1
          fi
          echo "Scan evaluated $TOTAL rules: ${{ steps.scan.outputs.passed }} passed, ${{ steps.scan.outputs.failed }} failed"
